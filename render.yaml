services:
  - type: web
    name: tgblaster-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID_LIST
        sync: false
    disk:
      name: tgblaster-data
      mountPath: /opt/render/project/src
      sizeGB: 1